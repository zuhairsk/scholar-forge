kind = "web"
previewPath = "/"
title = "ScholarForge"
version = "1.0.0"
id = "artifacts/scholar-forge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22924
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/scholar-forge run dev"

[services.env]
PORT = "22924"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/scholar-forge", "run", "build"]
publicDir = "artifacts/scholar-forge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
